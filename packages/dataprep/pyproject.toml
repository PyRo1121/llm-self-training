[project]
name = "llm-dataprep"
version = "0.1.0"
description = "Ingest Cursor, Codex, git diffs; curation and safety filters"
requires-python = ">=3.11,<3.14"
dependencies = [
    "datasets>=4.7",
    "huggingface-hub>=1.16.1",
    "llm-core",
]

[project.optional-dependencies]
git = ["pydriller>=2.6"]
zed = ["zstandard>=0.22"]
safety = [
    "presidio-analyzer>=2.2",
    "presidio-anonymizer>=2.2",
]

[project.scripts]
cursor-transcripts = "llm_dataprep.cursor_transcripts:main"
agent-ingest = "llm_dataprep.agent_ingest:main"
scan-raw = "llm_dataprep.scan_raw:main"
curate-raw = "llm_dataprep.curate_raw:main"
phase1 = "llm_dataprep.phase1_run:main"
link-logs-to-diffs = "llm_dataprep.link_logs_to_diffs:main"
replay-seed = "llm_dataprep.replay_seed:main"
audit-sample = "llm_dataprep.audit_sample:main"
public-ingest = "llm_dataprep.public_ingest:main"
lake-stats = "llm_dataprep.lake_stats:main"
warehouse-load = "llm_dataprep.warehouse_load:main"
training-manifest = "llm_dataprep.training_manifest:main"
training-extract = "llm_dataprep.training_extract:main"
warehouse-sync-registry = "llm_dataprep.warehouse_sync_registry:main"
probe-hf-schema = "llm_dataprep.probe_hf_schema:main"

[build-system]
requires = ["uv_build>=0.11.16,<0.12.0"]
build-backend = "uv_build"

[tool.uv.sources]
llm-core = { workspace = true }
