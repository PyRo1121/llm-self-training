[project]
name = "llm-eval"
version = "0.1.0"
description = "Internal eval suites — verdict-gated promote"
requires-python = ">=3.11,<3.14"
dependencies = [
    "llm-core",
    "httpx>=0.27",
    "pyyaml",
]

[project.scripts]
run-eval = "llm_eval.run_eval:main"

[tool.uv.sources]
llm-core = { workspace = true }

[build-system]
requires = ["uv_build>=0.11.16,<0.12.0"]
build-backend = "uv_build"
