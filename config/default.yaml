# LLM Self Training — default config (override via env or local yaml)

project:
  name: llm-self-training
  root_env: LLM_SELF_TRAINING_ROOT

ollama:
  host: http://127.0.0.1:11434
  inference_model: qwen2.5-coder:7b
  # RAG — see docs/oss/OLLAMA-INVENTORY.md
  embed_model: qwen3-embedding:4b
  embed_model_fallback: nomic-embed-text
  debug_judge_model: deepseek-r1:7b

# RAG rerank — not wired yet; Ollama /embed is for embeddings only
rerank:
  backend: null  # sentence_transformers | vllm
  model: null    # set when Phase 3 (e.g. bge-reranker-v2-m3 or Qwen3-Reranker)

# VRAM reclaim before train-qlora (packages/core/src/llm_core/gpu_mutex.py)
gpu_mutex:
  enabled: true
  min_free_vram_mib: 8000
  min_competitor_mib: 250          # ignore tiny GPU allocations
  reclaim_unknown_hogs: false      # true = kill any GPU hog not in protect/kill lists (aggressive)
  restore_hyprwhspr: true
  stop_ollama: true
  kill_grace_s: 2.0
  ghost_vram_threshold_mib: 1000
  ghost_wait_timeout_s: 12
  attempt_gpu_reset: true
  gpu_reset_use_sudo: true
  gpu_index: 0
  stop_systemd_units:
    - hyprwhspr.service
  kill_process_substrings:
    - hyprwhspr
    - helium-browser
    - chrome --type=gpu-process
    - chrome --type=renderer
    - google-chrome
    - chromium
    - brave-browser
    - firefox
    - librewolf
    - msedge
    - zen
    - ollama
    - llama-server
    - llama.cpp
    - vllm
    - text-generation
    - comfyui
    - whisper
    - train-qlora
    - torchrun
    - accelerate
    - deepspeed
    - llm-train
    - radar
  protect_process_substrings:
    - Xorg
    - Xwayland
    - wayland
    - gnome-shell
    - kwin
    - hyprland
    - nvidia-settings
    - nvidia-persistenced

train:
  backend: unsloth                     # unsloth (default) | chronicals
  base_model: Qwen/Qwen2.5-Coder-7B-Instruct
  # 4070 Ti 12 GB Unsloth bootstrap: r16 no-FA2 → seq≤1024 (vram_budget caps further)
  max_seq_length: 768
  max_seq_length_12gb_cap: 768
  max_chars_per_message: null
  lora_r_bootstrap: 16
  lora_r_promote: 32
  lora_alpha: 32
  lora_alpha_promote: 64
  lora_dropout: 0.0                    # Unsloth: keep 0 (optimized path)
  learning_rate: 2.0e-4                # Unsloth docs default for QLoRA
  per_device_train_batch_size: 2       # Unsloth eff batch 16 with grad_accum=8
  gradient_accumulation_steps: 8
  num_epochs: 1
  max_steps_cap: 150
  warmup_ratio: 0.05
  weight_decay: 0.01
  seed: 3407
  # neftune_noise_alpha: 5   # optional A/B

  # Applied with: train-qlora --promote (4070 Ti — FA2 unlocks 2048; no-FA2 r32 caps @ 768)
  promote:
    max_seq_length: 2048          # aspiration when flash-attn + BFD pack installed
    max_seq_length_12gb_cap: 2048
    max_chars_per_message: 12288  # ~3k tok/msg — long chats truncated before GPU tokenize
    lora_r: 32
    lora_alpha: 64                # 2× rank (Unsloth + QLoRA consensus)
    lora_dropout: 0.0
    learning_rate: 1.5e-4         # continual / quality sweet spot for Qwen2.5-Coder
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 16  # eff batch 16 (Unsloth docs sweet spot)
    max_steps_cap: 400            # ignored when unsloth.clamp_to_one_epoch=true
    warmup_ratio: 0.10
    weight_decay: 0.01
    num_epochs: 1
    # neftune_noise_alpha: 5      # A/B only — enable after stable promote + eval gate

  # Abliterated base + promote profile (--decensor on train-qlora)
  # Pre-abliterated Qwen2.5-Coder-7B; train-download-base caches weights while GPU train runs.
  decensor:
    base_model: huihui-ai/Qwen2.5-Coder-7B-Instruct-abliterated
    upstream_aligned: Qwen/Qwen2.5-Coder-7B-Instruct
    ollama_reference: huihui_ai/qwen2.5-coder-abliterate:7b
    modelfile: config/modelfiles/pyro-coder-inform.modelfile
    inform_slice: data/train/inform-dont-refuse.jsonl

# Unsloth runtime — default train backend (see unsloth.ai LoRA hyperparameters guide)
unsloth:
  use_prequantized: true
  prequantized_model: unsloth/Qwen2.5-Coder-7B-Instruct-bnb-4bit
  load_in_4bit: true
  target_modules: all-linear       # causal LM → q/k/v/o + gate/up/down (not vision string API)
  use_gradient_checkpointing: unsloth
  use_rslora: true
  disable_torch_compile: true      # NOT torch.compile — step-0 VRAM spike on 12GB
  packing: false                   # manual BFD when auto_pack_with_fa2 + FA2 installed
  packing_strategy: bfd_split      # TRL: bfd_split preserves long rows; bfd discards overflow
  auto_pack_with_fa2: true        # BFD pack when FA2 and padding-free off
  auto_padding_free: true          # FA2: Unsloth padding-free (~30-50% VRAM); needs flash-attn
  padding_free: false              # set by runtime when auto_padding_free + FA2
  disable_auto_padding_free: true  # runtime clears when FA2 + auto_padding_free
  pack_by_data_source: true        # BFD pack personal/public separately when packing
  stratified_eval_holdout: true    # 80/20 mix mirrored in eval split
  use_lora_plus: true
  lora_plus_lr_ratio: 16.0
  activation_offloading: false     # promote enables when FA2 (CPU RAM tradeoff)
  allow_activation_offload_without_fa: true  # stretch no-FA2 to 1024 when GPU reclaimed
  unsloth_tiled_mlp: false         # promote enables @ seq≥1536 (VRAM headroom)
  tiled_mlp_min_seq: 1536
  use_liger_kernel: false          # experimental with Unsloth+PEFT — off by default
  eval_holdout_ratio: 0.10
  eval_steps: 32
  eval_step_divisor: 6             # eval ~every 16% of epoch; save_steps matched
  vram_probe_max_seq: 2048
  token_audit_headroom_ratio: 1.05
  dataloader_num_workers: 0
  dataloader_pin_memory: true
  effective_batch_target: 16       # Unsloth docs: batch×grad_accum=16
  clamp_to_one_epoch: true         # quality: one pass unless --max-steps set
  token_audit: true                # TRL: pick max_length from length distribution
  token_audit_percentile: 95        # p99 too outlier-heavy for coding chats; TRL warns long max_length → OOM
  token_audit_round_to: 256
  token_audit_min_seq: 512
  # Rank-aware VRAM ceilings (4070 Ti 12GB) — see vram_budget.unsloth_vram_seq_ceiling
  max_seq_12gb_no_fa: 768          # legacy fallback
  max_seq_12gb_no_fa_r16: 1024     # bootstrap r16, no FA2 — post-load may downgrade
  max_seq_12gb_no_fa_r32: 768      # promote r32, no FA2 — proven stable on 4070 Ti
  max_seq_12gb_no_fa_r32_reclaimed: 1024  # no-FA2 stretch when free≥10.8 GiB + activation offload
  no_fa_stretch_min_free_gb: 10.8
  max_seq_12gb_no_fa_r64: 512
  max_seq_12gb_with_fa: 2048       # FA2 + padding-free path
  max_seq_12gb_with_fa_r16: 2048
  max_seq_12gb_with_fa_r32: 2048
  max_seq_12gb_with_fa_r64: 1536
  max_seq_tight_vram: 768          # free VRAM < 9.5 GiB pre-load (no FA2)
  max_seq_moderate_vram: 1024      # free VRAM < 10.5 GiB pre-load (no FA2)
  max_seq_tight_vram_fa: 1536      # FA2 + free < 9.0 GiB
  max_seq_moderate_vram_fa: 2048   # FA2 + free < 9.5 GiB (browser closed → usually 2048)
  vram_probe_batch_size: 2         # only when FA2 + free≥10 GiB (see vram_budget.py)
  step0_headroom_mib: 1200         # min free MiB after model load (fused LoRA MLP step-0)
  load_best_model_at_end: true
  optim: adamw_8bit
  max_grad_norm: 1.0               # NOT 0.3 — 0.3 diverged on Chronicals promote-v2
  lr_scheduler_type: cosine
  dataset_num_proc: 1
  use_train_on_responses_only: false
  max_seq_12gb_cap: 2048           # NOT 4096 on 4070 Ti 12GB
  promote:
    dataset_num_proc: 8            # i9 tokenize prefetch (12 if CPU-only bottleneck)
    lr_scheduler_type: cosine
    dataloader_num_workers: 4      # FA2 only at runtime; forced 0 without FA2 (12GB)
    dataloader_prefetch_factor: 2
    activation_offloading: true    # TRL activation offload when FA2 (or no-FA stretch)
    unsloth_tiled_mlp: true        # VRAM headroom @ seq≥1536 (2048 promote)
    # neftune_noise_alpha: 5       # A/B if style eval fails after v2

# Chronicals runtime (legacy --chronicals backend only)
chronicals:
  use_liger_kernel: false         # class-level RMSNorm/SwiGLU only; no fused LCE (PEFT fragile)
  use_lora_plus: true             # 16x LR on LoRA B matrices (ICML 2024)
  lora_plus_lr_ratio: 16.0
  use_sequence_packing: false     # BFD needs flash-attn
  packing_strategy: bfd
  use_8bit_optimizer: true        # paged_adamw_8bit via bitsandbytes
  use_gradient_checkpointing: true
  use_chronicals_gradient_checkpointing: true   # sqrt(n) layer GC — required on 12 GiB
  use_activation_offload: false   # CPU offload activations (32GB RAM); enable in promote
  use_flash_attention: false      # pip install flash-attn --no-build-isolation
  torch_compile: false            # step-0 VRAM spike on 12GB; opt-in after flash-attn stable
  torch_compile_mode: reduce-overhead  # or max-autotune when torch_compile: true
  loss_type: nll
  gpu_peak_tflops: 330.0          # RTX 4070 Ti class
  dataloader_num_workers: 0       # bootstrap; promote uses CPU prefetch
  dataloader_pin_memory: true
  dataloader_prefetch_factor: 2

  promote:
    use_liger_kernel: true        # class-level fused RMSNorm/SwiGLU (no LCE)
    use_activation_offload: true  # unlock seq 1024 on 12GB with Chronicals sqrt GC
    dataloader_num_workers: 8     # i9-14900K prefetch (tokenized batches on CPU)
    dataloader_prefetch_factor: 2

data:
  min_tier1_smoke: 200
  min_tier1_promote: 500
  personal_ratio_mature: 0.80

# Training mix from warehouse — personal always included; public by ratio + priority
# Synthetic HF sets enabled after S10 audit (loaders + fast_ingest); zen_agentic stays off (no HF shards).
training_mix:
  prioritize_personal: true       # never drop personal rows when building a manifest
  personal_ratio: 0.90            # 90% personal / 10% public in mixed manifests
  public_cap: null                 # no hard cap — ratio + warehouse row count bound public rows
  public_dataset_priority:
    - swe_zero_openhands
    - swe_zero_12m
    - swe_chat
    - coderforge_preview
    - swe_next
    - nemotron_opencode
    - agentic_sft_new
    - agentic_cot_coding
    - nemotron_swe_v2
    - scale_swe
    - cooper_qwen9b_coop_claude
    - ling_coder_sft
    - opencode_refined
    - github_public
  personal_sample_weight: 1.0
  public_sample_weight: 0.25

# Curation policy (operator intent — not enforced by keyword filters in dataprep)
curation:
  filter_secrets_and_pii: true
  filter_topics_or_refusals: false   # gray-area security/coding content is training-eligible
  bootstrap_mode: true               # tier-1 without exec/verify until link_logs_to_diffs
  skip_roles: [developer, system]    # codex permission blobs, system prompts
  min_messages: 2
  min_message_chars: 40
  min_total_chars: 200
  max_chars_per_message: 16000
  max_messages_per_example: 24
  chunk_overlap_messages: 4
  # Personal agent logs (Cursor/Codex): long sessions are tool-heavy; public defaults are too lossy.
  personal:
    min_message_chars: 8          # keep tool turns; structured [tool …] text, not noise
    min_messages: 4               # drop trivial 2-turn ping-pong
    min_total_chars: 400          # stricter than public (200)
  by_harness:
    cursor:
      min_message_chars: 8
    codex:
      min_message_chars: 12
  # Illegal use is out of scope for dataset filters; handle at runtime / human judgment.

replay:
  target_rows: 300
  tier1_sample_fraction: 0.25
  include_tier2: true

phase1:
  audit_sample_size: 50

# Public HF datasets → data/raw/public-*.jsonl (then curate-raw / phase1)
# Final Top 10 plan: docs/oss/PUBLIC-DATASETS.md
public_datasets:
  enabled: true
  ingest:
    mode: fast                    # fast | stream — fast = snapshot cache + local parquet
    cache_dir: hf_cache           # under LLM_DATA_DIR or repo data/
    download_workers: 16          # snapshot_download max_workers
    convert_workers: 12           # parallel parquet → JSONL (multi-shard sets; raise if RAM headroom)
    refresh_download: false
    write_buffer_rows: 500
  datasets:
    # --- Real / wild ---
    swe_chat:
      enabled: true
      max_rows: null     # full ingest (gated — hf auth login)
    zen_agentic:
      enabled: false     # HF placeholder — enable when shards land
      max_rows: null
    # --- Synthetic / agent-rollout (S10 audit PASS — loaders + fast_ingest) ---
    coderforge_preview:
      enabled: true
      max_rows: null
    swe_next:
      enabled: true
      max_rows: null
    swe_zero_12m:
      enabled: true
      max_rows: null
      exit_status: Submitted
    swe_zero_openhands:
      enabled: true
      max_rows: null
      require_patch: true
    agentic_sft_new:
      enabled: true
      max_rows: null
    agentic_cot_coding:
      enabled: true
      max_rows: null
    nemotron_opencode:
      enabled: true
      max_rows: null
    cooper_qwen9b_coop_claude:
      enabled: true
      max_rows: null
    # --- Legacy (S10-verified loaders) ---
    opencode_refined:
      enabled: true
      max_rows: null
    ling_coder_sft:
      enabled: true
      max_rows: null
    nemotron_swe_v2:
      enabled: true
      max_rows: null
      splits: agentless
    scale_swe:
      enabled: true
      max_rows: null

warehouse:
  # Turso — docs/oss/TURSO.md (enable experimental_features only after reading each flag page)
  path: data/warehouse/control_plane.db
  driver: turso  # sqlite | turso (pyturso)
  sync:
    enabled: false
    # remote_url: libsql://...
    # remote_auth_token: env TURSO_AUTH_TOKEN
  experimental_features: []  # e.g. index_method for FTS — set when implementing Step 6

rag:
  chroma_path: data/chroma_db
  collection: allowlist_v1
  allowlist: config/doc_allowlist.yaml
  top_k: 8
  # Sources with context7_library_id are metadata-only unless force_index: true
  force_index_context7: false

ingest:
  # Registry: packages/dataprep/.../harnesses.py — probe: agent-ingest --list-harnesses
  cursor_projects: ~/.cursor/projects
  codex_sessions: ~/.codex/sessions
  claude_projects: ~/.claude/projects
  pi_sessions: ~/.pi/agent/sessions
  opencode_data: ~/.local/share/opencode
  t3_home: ~/.t3
  continue_sessions: ~/.continue/sessions
  gemini_tmp: ~/.gemini/tmp
  cline_cli: ~/.cline/data
  codex_max_file_mb: 200   # long rollouts (2–12h sessions); was 50 (dropped ~125MB files)
  git_max_commits: 500
  # windsurf: ~/.codeium/windsurf/cascade — encrypted; UI export only

# Safety scan policy (scan-raw, curate, audit-sample) — see config/safety-allowlist.yaml
safety:
  version: 1                          # bump when block thresholds / entities change
  quarantine_severity: block          # block | warn — only block-level findings quarantine rows
  gitleaks_severity: block            # block | warn — gitleaks hits (after allowlist)
  scan:
    presidio_mode: pattern            # off | pattern (default) | full (spaCy NER — slow)
    profiles:
      personal:
        glob: "cursor-*.jsonl"
        presidio_mode: pattern
      public:
        glob: "public-*.jsonl"
        presidio_mode: pattern
  curate:
    presidio_mode: "off"              # quoted — YAML 1.1 treats bare off/no as false
  diff_harnesses:                     # scan added lines only for these harnesses (diff_scan.py)
    - git
    - git-diffs
  presidio:
    min_score:                        # below threshold → drop finding (no quarantine)
      EMAIL_ADDRESS: 0.55
      PHONE_NUMBER: 0.65
      US_SSN: 0.75
      CREDIT_CARD: 0.75
      US_BANK_NUMBER: 0.75
      IBAN_CODE: 0.75
      IP_ADDRESS: 0.85
      PERSON: 0.92
      LOCATION: 0.95                  # scanned but warn-only unless in block_entities
      DATE_TIME: 0.95
      NRP: 0.95
      HF_TOKEN: 0.85
      CURSOR_TOKEN: 0.85
      TURSO_TOKEN: 0.85
    entities:                         # omit noisy LOCATION/NRP/DATE_TIME from scan surface
      - EMAIL_ADDRESS
      - PHONE_NUMBER
      - US_SSN
      - CREDIT_CARD
      - US_BANK_NUMBER
      - IBAN_CODE
      - IP_ADDRESS
      - US_DRIVER_LICENSE
      - US_PASSPORT
      - CRYPTO
      - MEDICAL_LICENSE
      - HF_TOKEN
      - CURSOR_TOKEN
      - TURSO_TOKEN
    block_entities:                   # presidio kinds that quarantine when above min_score
      - EMAIL_ADDRESS
      - PHONE_NUMBER
      - US_SSN
      - CREDIT_CARD
      - US_BANK_NUMBER
      - IBAN_CODE
      - US_DRIVER_LICENSE
      - US_PASSPORT
      - CRYPTO
      - HF_TOKEN
      - CURSOR_TOKEN
      - TURSO_TOKEN

eval:
  style_win_rate_delta: 0.05
  regression_floor: 0.05
