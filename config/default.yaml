# LLM Self Training — default config (override via env or local yaml)

project:
  name: llm-self-training
  root_env: LLM_SELF_TRAINING_ROOT

ollama:
  host: http://127.0.0.1:11434
  inference_model: qwen2.5-coder:7b
  # RAG Phase 3+ — you already have qwen3-embedding:4b (better than nomic); see docs/OLLAMA-INVENTORY.md
  embed_model: qwen3-embedding:4b
  embed_model_fallback: nomic-embed-text
  debug_judge_model: deepseek-r1:7b

# RAG rerank — not wired yet; Ollama /embed is for embeddings only
rerank:
  backend: null  # sentence_transformers | vllm
  model: null    # set when Phase 3 (e.g. bge-reranker-v2-m3 or Qwen3-Reranker)

# VRAM reclaim before train-qlora (packages/core/src/llm_core/gpu_mutex.py)
gpu_mutex:
  enabled: true
  min_free_vram_mib: 8000
  min_competitor_mib: 250          # ignore tiny GPU allocations
  reclaim_unknown_hogs: false      # true = kill any GPU hog not in protect/kill lists (aggressive)
  restore_hyprwhspr: true
  stop_ollama: true
  kill_grace_s: 2.0
  ghost_vram_threshold_mib: 1000
  ghost_wait_timeout_s: 12
  attempt_gpu_reset: true
  gpu_reset_use_sudo: true
  gpu_index: 0
  stop_systemd_units:
    - hyprwhspr.service
  kill_process_substrings:
    - hyprwhspr
    - ollama
    - llama-server
    - llama.cpp
    - vllm
    - text-generation
    - comfyui
    - whisper
    - train-qlora
    - torchrun
    - accelerate
    - deepspeed
    - llm-train
    - radar
  protect_process_substrings:
    - Xorg
    - Xwayland
    - wayland
    - gnome-shell
    - kwin
    - hyprland
    - nvidia-settings
    - nvidia-persistenced

train:
  backend: unsloth                     # unsloth (default) | chronicals
  base_model: Qwen/Qwen2.5-Coder-7B-Instruct
  # 4070 Ti 12 GB Unsloth: batch=2 seq<=2048 @ ~10 GiB free (no CPU activation offload)
  max_seq_length: 768
  max_seq_length_12gb_cap: 768
  max_chars_per_message: null
  lora_r_bootstrap: 16
  lora_r_promote: 32
  lora_alpha: 32
  lora_alpha_promote: 64
  lora_dropout: 0.0                    # Unsloth: keep 0 (optimized path)
  learning_rate: 2.0e-4                # Unsloth docs default for QLoRA
  per_device_train_batch_size: 2       # Unsloth eff batch 16 with grad_accum=8
  gradient_accumulation_steps: 8
  num_epochs: 1
  max_steps_cap: 150
  warmup_ratio: 0.05
  weight_decay: 0.01
  seed: 3407
  # neftune_noise_alpha: 5   # optional A/B

  # Applied with: train-qlora --promote (world-class Unsloth on 4070 Ti)
  promote:
    max_seq_length: 2048          # not 4096 — OOM on 12GB without FA2 (drop to 1024 if tight)
    max_seq_length_12gb_cap: 2048
    lora_r: 32
    lora_alpha: 64                # 2× rank (2026 consensus)
    lora_dropout: 0.0
    learning_rate: 1.5e-4         # continual / quality sweet spot for Qwen2.5-Coder
    per_device_train_batch_size: 1
    gradient_accumulation_steps: 12  # eff batch 12 — stable on 10–11 GiB VRAM
    max_steps_cap: 400
    warmup_ratio: 0.10
    weight_decay: 0.01
    num_epochs: 1
    # neftune_noise_alpha: 5      # A/B if style gate fails

  # Abliterated base + promote profile (--decensor on train-qlora)
  # Pre-abliterated Qwen2.5-Coder-7B; train-download-base caches weights while GPU train runs.
  decensor:
    base_model: huihui-ai/Qwen2.5-Coder-7B-Instruct-abliterated
    upstream_aligned: Qwen/Qwen2.5-Coder-7B-Instruct
    ollama_reference: huihui_ai/qwen2.5-coder-abliterate:7b
    modelfile: config/modelfiles/pyro-coder-inform.modelfile
    inform_slice: data/train/inform-dont-refuse.jsonl

# Unsloth runtime — default train backend (see unsloth.ai LoRA hyperparameters guide)
unsloth:
  use_prequantized: true
  prequantized_model: unsloth/Qwen2.5-Coder-7B-Instruct-bnb-4bit
  load_in_4bit: true
  target_modules: all-linear       # all attention + MLP (QLoRA paper / Unsloth default)
  use_gradient_checkpointing: unsloth
  use_rslora: true
  disable_torch_compile: true      # NOT torch.compile — step-0 VRAM spike on 12GB
  packing: false                   # Unsloth padding-free auto; explicit packing=False
  optim: adamw_8bit
  max_grad_norm: 1.0               # NOT 0.3 — 0.3 diverged on Chronicals promote-v2
  lr_scheduler_type: cosine
  dataset_num_proc: 1
  use_train_on_responses_only: false
  max_seq_12gb_cap: 2048           # NOT 4096 on 4070 Ti 12GB
  promote:
    dataset_num_proc: 8            # i9 tokenize prefetch (12 if CPU-only bottleneck)
    lr_scheduler_type: cosine

# Chronicals runtime (legacy --chronicals backend only)
chronicals:
  use_liger_kernel: false         # class-level RMSNorm/SwiGLU only; no fused LCE (PEFT fragile)
  use_lora_plus: true             # 16x LR on LoRA B matrices (ICML 2024)
  lora_plus_lr_ratio: 16.0
  use_sequence_packing: false     # BFD needs flash-attn
  packing_strategy: bfd
  use_8bit_optimizer: true        # paged_adamw_8bit via bitsandbytes
  use_gradient_checkpointing: true
  use_chronicals_gradient_checkpointing: true   # sqrt(n) layer GC — required on 12 GiB
  use_activation_offload: false   # CPU offload activations (32GB RAM); enable in promote
  use_flash_attention: false      # pip install flash-attn --no-build-isolation
  torch_compile: false            # step-0 VRAM spike on 12GB; opt-in after flash-attn stable
  torch_compile_mode: reduce-overhead  # or max-autotune when torch_compile: true
  loss_type: nll
  gpu_peak_tflops: 330.0          # RTX 4070 Ti class
  dataloader_num_workers: 0       # bootstrap; promote uses CPU prefetch
  dataloader_pin_memory: true
  dataloader_prefetch_factor: 2

  promote:
    use_liger_kernel: true        # class-level fused RMSNorm/SwiGLU (no LCE)
    use_activation_offload: true  # unlock seq 1024 on 12GB with Chronicals sqrt GC
    dataloader_num_workers: 8     # i9-14900K prefetch (tokenized batches on CPU)
    dataloader_prefetch_factor: 2

data:
  min_tier1_smoke: 200
  min_tier1_promote: 500
  personal_ratio_mature: 0.80

# Training mix from warehouse — personal always included; public capped
training_mix:
  prioritize_personal: true       # never drop personal rows when building a manifest
  personal_ratio: 0.80            # target: 80% personal / 20% public (PLAN mature)
  public_cap: null                 # null = ratio-only cap; set int to hard-limit public rows
  public_dataset_priority:        # fill public quota from Top 10 first (docs/PUBLIC-DATASETS.md)
    - swe_chat
    - ultradata_sft_2605
    - coderforge_preview
    - swe_next
    - nemotron_opencode
    - high_coder_sft
    - agentic_sft_new
    - agentic_cot_coding
    - agent_trove
    - zen_agentic
    - codex_7m
    - codex_2m_thinking
  personal_sample_weight: 1.0     # for future weighted SFT (Phase 2)
  public_sample_weight: 0.35

# Curation policy (operator intent — not enforced by keyword filters in dataprep)
curation:
  filter_secrets_and_pii: true
  filter_topics_or_refusals: false   # gray-area security/coding content is training-eligible
  bootstrap_mode: true               # tier-1 without exec/verify until link_logs_to_diffs
  skip_roles: [developer, system]    # codex permission blobs, system prompts
  min_messages: 2
  min_message_chars: 40
  min_total_chars: 200
  max_chars_per_message: 16000
  max_messages_per_example: 24
  chunk_overlap_messages: 4
  # Illegal use is out of scope for dataset filters; handle at runtime / human judgment.

replay:
  target_rows: 300
  tier1_sample_fraction: 0.25
  include_tier2: true

phase1:
  audit_sample_size: 50

# Public HF datasets → data/raw/public-*.jsonl (then curate-raw / phase1)
# Final Top 10 plan: docs/PUBLIC-DATASETS.md
public_datasets:
  enabled: true
  datasets:
    # --- Top 10 (May 2026) ---
    ultradata_sft_2605:
      enabled: true
      max_rows: 50000
    swe_chat:
      enabled: true
      max_rows: 200000   # conversation rows before session grouping
    coderforge_preview:
      enabled: true
      max_rows: 10000
    zen_agentic:
      enabled: false     # HF placeholder — enable when shards available
      max_rows: 5000
    swe_next:
      enabled: true
      max_rows: null     # all ~3693 trajectories
    high_coder_sft:
      enabled: true
      max_rows: 10000
    agentic_sft_new:
      enabled: true
      max_rows: 10000
    agentic_cot_coding:
      enabled: true
      max_rows: 10000
    nemotron_opencode:
      enabled: true
      max_rows: 10000
    agent_trove:
      enabled: true
      max_rows: 10000
    # --- Legacy (pre-Top-10) ---
    opencode_broad:
      enabled: false
      max_rows: 10000
    opencode_refined:
      enabled: false
      max_rows: 5000
    nemotron_swe:
      enabled: false
      max_rows: 10000
    self_code_align:
      enabled: false
      max_rows: null
    magicoder_75k:
      enabled: false
      max_rows: 10000
    # --- Optional extras (not Top 10; other chat added) ---
    codex_7m:
      enabled: true
      max_rows: 10000
    codex_2m_thinking:
      enabled: true
      max_rows: 5000

warehouse:
  # Phase 1.5 — docs/TURSO.md (enable experimental_features only after reading each flag page)
  path: data/warehouse/control_plane.db
  driver: turso  # sqlite | turso (pyturso)
  sync:
    enabled: false
    # remote_url: libsql://...
    # remote_auth_token: env TURSO_AUTH_TOKEN
  experimental_features: []  # e.g. index_method for FTS — set when implementing Step 6

rag:
  chroma_path: data/chroma_db
  collection: allowlist_v1
  allowlist: config/doc_allowlist.yaml
  top_k: 8
  # Sources with context7_library_id are metadata-only unless force_index: true
  force_index_context7: false

ingest:
  # Registry: packages/dataprep/.../harnesses.py — probe: agent-ingest --list-harnesses
  cursor_projects: ~/.cursor/projects
  codex_sessions: ~/.codex/sessions
  claude_projects: ~/.claude/projects
  pi_sessions: ~/.pi/agent/sessions
  opencode_data: ~/.local/share/opencode
  t3_home: ~/.t3
  continue_sessions: ~/.continue/sessions
  gemini_tmp: ~/.gemini/tmp
  cline_cli: ~/.cline/data
  codex_max_file_mb: 50
  git_max_commits: 500
  # windsurf: ~/.codeium/windsurf/cascade — encrypted; UI export only

eval:
  style_win_rate_delta: 0.05
  regression_floor: 0.05
